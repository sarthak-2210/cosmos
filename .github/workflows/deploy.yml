name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Cosmos solar system → https://sarthak-2210.github.io/cosmos/
      - name: Install & build Cosmos
        working-directory: Cosmos
        run: |
          npm ci
          npm run build

      # Zombie Island → https://sarthak-2210.github.io/cosmos/island/
      - name: Install & build Island
        working-directory: island
        run: |
          npm ci
          npm run build

      - name: Assemble GitHub Pages site
        run: |
          rm -rf dist
          mkdir -p dist/island
          cp -a Cosmos/dist/. dist/
          cp -a island/dist/. dist/island/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
